name: Eval Regression

on:
  pull_request:
    paths:
      - "prompt-templates/**"
      - "services/classifier/**"
      - "services/evaluation/**"
      - "data/golden_datasets/**"

jobs:
  golden-eval:
    name: Golden Dataset Regression Gate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://converta:converta@localhost:5432/converta
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run golden dataset regression
        run: pytest tests/regression/ -v --tb=short
      - name: Assert pass rate >= 95%
        run: |
          pytest tests/regression/test_golden_eval.py::test_golden_pass_rate -v
