name: Deploy — Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: Build & Deploy to Staging (ECS)
    runs-on: ubuntu-latest
    environment: staging
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f infra/docker/Dockerfile -t $ECR_REGISTRY/converta:$IMAGE_TAG .
          docker push $ECR_REGISTRY/converta:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/converta:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ECS staging
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster converta-staging \
            --service converta-api \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster converta-staging \
            --services converta-api \
            --region us-east-1

      - name: Smoke tests
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}"
          curl -f "$STAGING_URL/health" || exit 1
          echo "Smoke tests passed"
