version: "3.9"

x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://converta:converta@postgres:5432/converta
  DATABASE_URL_SYNC: postgresql+psycopg2://converta:converta@postgres:5432/converta
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  MLFLOW_TRACKING_URI: http://mlflow:5001

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: converta
      POSTGRES_PASSWORD: converta
      POSTGRES_DB: converta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U converta"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *app-env
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    environment:
      <<: *app-env
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A services.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    environment:
      <<: *app-env
    env_file:
      - ../../.env
    depends_on:
      - redis
    command: celery -A services.celery_app beat --loglevel=info

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5001:5001"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://converta:converta@postgres:5432/converta
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlartifacts
    volumes:
      - mlflow_artifacts:/mlartifacts
    depends_on:
      postgres:
        condition: service_healthy
    command: mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri postgresql+psycopg2://converta:converta@postgres:5432/converta --default-artifact-root /mlartifacts

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mlflow_artifacts:
  grafana_data:
